<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solidify - Web3 Security Auditor</title>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0d1117;color:#c9d1d9}.app{max-width:1200px;margin:0 auto;padding:20px}header{text-align:center;margin-bottom:30px}header h1{font-size:2.5rem;background:linear-gradient(90deg,#58a6ff,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.input-section{display:flex;gap:20px;margin-bottom:20px}.chain-input{flex:1;display:flex;flex-direction:column;gap:10px}.chain-input label{font-weight:600;color:#8b949e}.chain-input select,.chain-input input{padding:10px;border-radius:6px;border:1px solid #30363d;background:#161b22;color:#c9d1d9;font-size:14px}.code-editor{border-radius:8px;overflow:hidden;margin-bottom:20px}.audit-btn{width:100%;padding:14px;border:none;border-radius:6px;background:linear-gradient(90deg,#238636,#2ea043);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .2s}.audit-btn:disabled{opacity:.6;cursor:not-allowed}.audit-btn:hover:not(:disabled){transform:scale(1.01)}.status{padding:15px;margin:20px 0;border-radius:6px;background:#161b22;text-align:center}.audit-report{background:#161b22;border-radius:8px;padding:20px}.audit-report.empty{text-align:center;color:#8b949e}.summary{display:flex;gap:20px;margin-bottom:20px;font-size:18px}.vuln{padding:15px;margin-bottom:10px;border-radius:6px;border-left:4px solid}.vuln.critical{border-color:#f85149;background:#2d1b1b}.vuln.high{border-color:#f0883e;background:#2d2318}.vuln.medium{border-color:#d29922;background:#2d2a18}.vuln.low{border-color:#3fb950;background:#1b2d1b}.severity{display:inline-block;padding:2px 8px;border-radius:4px;margin-right:10px;font-size:12px;font-weight:600}.vuln.critical .severity{background:#f85149}.vuln.high .severity{background:#f0883e}.vuln.medium .severity{background:#d29922}.vuln.low .severity{background:#3fb950}</style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
