<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solidify - Web3 Security Auditor</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#c9d1d9;--text2:#8b949e;--primary:#58a6ff;--accent:#8b5cf6;--green:#3fb950;--yellow:#d29922;--orange:#f0883e;--red:#f85149}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
    .app{max-width:1100px;margin:0 auto;padding:20px}
    header{text-align:center;padding:30px 0 20px}
    .logo{display:flex;align-items:center;justify-content:center;gap:12px}
    .logo h1{font-size:2.5rem;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .logo .badge{font-size:0.7rem;padding:3px 8px;background:linear-gradient(90deg,var(--green),#2ea043);border-radius:4px;font-weight:700}
    header p{color:var(--text2);margin-top:8px}
    
    .mode-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:24px;background:var(--bg2);padding:6px;border-radius:12px}
    .mode-tab{display:flex;align-items:center;gap:8px;padding:12px 24px;border:none;background:transparent;color:var(--text2);border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:15px}
    .mode-tab:hover{background:var(--bg3);color:var(--text)}
    .mode-tab.active{background:var(--primary);color:#fff}
    .mode-tab .icon{font-size:18px}
    
    .input-section{margin-bottom:20px}
    .chain-input{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
    .chain-input>*{flex:1;min-width:200px}
    .chain-input label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
    .chain-input select,.chain-input input{padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);width:100%;font-size:14px}
    .chain-input select:focus,.chain-input input:focus{outline:none;border-color:var(--primary)}
    
    .editor-section,.upload-section,.chain-section{margin-bottom:20px}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .section-header h3{font-size:15px;color:var(--text2)}
    
    .code-editor{border-radius:12px;overflow:hidden;border:1px solid var(--border)}
    
    .file-upload{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all 0.2s}
    .file-upload:hover,.file-upload.dragging{border-color:var(--primary);background:rgba(88,166,255,0.05)}
    .file-upload .icon{font-size:48px;display:block;margin-bottom:12px}
    .file-upload p{color:var(--text2)}
    .file-upload .or{color:var(--text2);font-size:13px;margin:12px 0}
    .file-upload .browse-btn{padding:10px 20px;background:var(--primary);color:#fff;border-radius:6px;border:none;cursor:pointer}
    .file-info{display:flex;align-items:center;gap:12px;justify-content:center}
    .file-info .file-icon{font-size:24px}
    .file-name{font-weight:600}
    .clear-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px}
    
    .address-input{margin-bottom:20px}
    .address-input label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
    .address-input input{padding:14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);width:100%;font-size:16px;font-family:monospace}
    .hint{font-size:13px;color:var(--text2);margin-top:8px}
    
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:24px 0}
    .audit-btn{padding:14px 32px;border:none;border-radius:8px;background:linear-gradient(90deg,var(--primary),var(--accent));color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s}
    .audit-btn:disabled{opacity:0.6;cursor:not-allowed}
    .audit-btn:hover:not(:disabled){transform:scale(1.02);box-shadow:0 4px 20px rgba(88,166,255,0.3)}
    .secondary-btn{padding:12px 20px;border-radius:8px;background:var(--bg2);color:var(--text);border:1px solid var(--border);cursor:pointer;transition:all 0.2s}
    .secondary-btn:hover{background:var(--bg3)}
    
    .audit-report{background:var(--bg2);border-radius:16px;padding:24px;margin-top:30px}
    .audit-report.empty{text-align:center;padding:60px;color:var(--text2)}
    .empty-icon{font-size:48px;margin-bottom:16px}
    .report-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .report-header h2{font-size:20px}
    .actions{display:flex;gap:8px}
    .btn-small{padding:8px 16px;border-radius:6px;background:var(--bg3);color:var(--text);border:1px solid var(--border);cursor:pointer;font-size:13px}
    .btn-small.primary{background:var(--primary);color:#fff;border:none}
    
    .score-card{display:flex;justify-content:space-between;align-items:center;background:var(--bg);padding:24px;border-radius:12px;margin-bottom:24px}
    .score-value{font-size:48px;font-weight:700;background:linear-gradient(90deg,var(--green),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .score-label{color:var(--text2);font-size:14px}
    .severity-counts{display:flex;gap:16px}
    .severity-counts .count{text-align:center;padding:8px 16px;border-radius:8px;background:var(--bg2)}
    .severity-counts .count span{display:block;font-size:24px;font-weight:700}
    .severity-counts .count.critical{color:var(--red)}
    .severity-counts .count.high{color:var(--orange)}
    .severity-counts .count.medium{color:var(--yellow)}
    .severity-counts .count.low{color:var(--green)}
    
    .summary-section{background:var(--bg);padding:16px;border-radius:8px;margin-bottom:24px}
    .summary-section h3{font-size:14px;color:var(--text2);margin-bottom:8px}
    
    .vulnerabilities h3{font-size:16px;margin-bottom:16px}
    .no-vulns{text-align:center;padding:40px;color:var(--green)}
    
    .vuln-card{background:var(--bg);border-radius:8px;margin-bottom:12px;overflow:hidden}
    .vuln-card.critical{border-left:4px solid var(--red)}
    .vuln-card.high{border-left:4px solid var(--orange)}
    .vuln-card.medium{border-left:4px solid var(--yellow)}
    .vuln-card.low{border-left:4px solid var(--green)}
    .vuln-header{display:flex;justify-content:space-between;align-items:center;padding:16px;cursor:pointer}
    .vuln-title{display:flex;align-items:center;gap:12px}
    .severity-badge{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700}
    .vuln-type{font-weight:600}
    .expand-icon{color:var(--text2)}
    
    .vuln-details{padding:0 16px 16px;border-top:1px solid var(--border)}
    .detail-row{margin-top:16px}
    .detail-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
    .detail-row code{font-family:monospace;background:var(--bg2);padding:8px 12px;border-radius:4px;display:block}
    .detail-row p{color:var(--text)}
    .recommendation{color:var(--green) !important}
    .cvss{padding:4px 12px;background:var(--bg2);border-radius:4px}
    
    .patch-section{margin-top:16px}
    .patch-code{background:var(--bg2);padding:12px;border-radius:6px;font-family:monospace;font-size:13px;margin-top:12px;overflow-x:auto}
    
    .progress-container{margin:20px 0}
    .progress-steps{display:flex;justify-content:space-between}
    .progress-steps .step{text-align:center;flex:1;position:relative}
    .progress-steps .step::before{content:'';position:absolute;top:8px;left:0;right:0;height:2px;background:var(--border)}
    .progress-steps .step.done::before{background:var(--primary)}
    .step-dot{width:16px;height:16px;border-radius:50%;background:var(--border);margin:0 auto 8px;position:relative;z-index:1}
    .progress-steps .step.done .step-dot{background:var(--primary)}
    .progress-steps .step span{font-size:12px;color:var(--text2)}
    
    .cmd-btn{padding:12px 20px;border-radius:8px;background:var(--bg3);color:var(--text);border:1px solid var(--border);cursor:pointer;font-size:14px;margin-left:8px}
    .cmd-btn:hover{background:var(--border)}
    
    .stream-output{background:var(--bg);padding:16px;border-radius:8px;margin:16px 0;font-family:monospace;font-size:13px;max-height:200px;overflow:auto;white-space:pre-wrap}
    .stream-output .thinking{color:var(--primary)}
    
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000}
    .modal{background:var(--bg2);padding:24px;border-radius:12px;width:90%;max-width:500px}
    .modal h3{margin-bottom:16px}
    .modal textarea{width:100%;height:120px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;resize:none}
    .modal-actions{display:flex;gap:12px;margin-top:16px}
    .modal-actions button{padding:10px 20px;border-radius:6px;background:var(--bg3);color:var(--text);border:1px solid var(--border);cursor:pointer}
    .modal-actions button.primary{background:var(--primary);color:#fff;border:none}
    .ask-answer{background:var(--bg);padding:12px;border-radius:8px;margin-top:16px;white-space:pre-wrap}
    
    .chat-toggle{position:fixed;bottom:20px;right:20px;padding:14px 24px;background:linear-gradient(90deg,var(--primary),var(--accent));color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(88,166,255,0.4);z-index:100}
    .chat-toggle:hover{transform:scale(1.05)}
    
    .chat-panel{position:fixed;top:0;right:0;width:400px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:200;display:flex;flex-direction:column}
    .chat-header{display:flex;justify-content:space-between;align-items:center;padding:16px;background:var(--bg);border-bottom:1px solid var(--border)}
    .chat-header button{background:none;border:none;color:var(--text);font-size:18px;cursor:pointer}
    .chat-messages{flex:1;overflow:auto;padding:16px}
    .chat-welcome{color:var(--text2);line-height:1.6}
    .chat-welcome ul{margin:12px 0;padding-left:20px}
    .chat-message{margin-bottom:16px}
    .chat-message .role{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
    .chat-message.user .content{background:var(--primary);color:#fff;padding:12px;border-radius:12px 12px 0 12px}
    .chat-message.assistant .content{background:var(--bg);padding:12px;border-radius:12px 12px 12px 0}
    .chat-loading{color:var(--primary);font-style:italic}
    .chat-input{display:flex;gap:8px;padding:16px;background:var(--bg);border-top:1px solid var(--border)}
    .chat-input input{flex:1;padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text)}
    .chat-input button{padding:12px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer}
    .chat-input button:disabled{opacity:0.5}
    
    .top-bar{display:flex;gap:16px;justify-content:center;align-items:center;margin-top:8px}
    .version,.provider,.session{font-size:13px;padding:4px 12px;background:var(--bg2);border-radius:20px}
    .provider{color:var(--primary)}
    .session{color:var(--text2)}
    .settings-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px}
    
    .settings-modal{width:500px;max-height:80vh;overflow:auto}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .modal-header button{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer}
    .settings-section{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
    .settings-section:last-child{border:none}
    .settings-section h4{color:var(--primary);margin-bottom:12px}
    .settings-section select{width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text)}
    .sessions-list{margin-bottom:12px}
    .session-item{display:flex;justify-content:space-between;padding:12px;background:var(--bg);border-radius:8px;margin-bottom:8px}
    .session-item.active{border-left:3px solid var(--primary)}
    .session-date{color:var(--text2);font-size:12px}
    .commands-list{background:var(--bg);padding:16px;border-radius:8px;font-size:13px;line-height:1.8}
    .commands-list code{background:var(--primary);padding:2px 8px;border-radius:4px;color:#fff}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
